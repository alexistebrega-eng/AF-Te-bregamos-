<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AF Te Bregamos</title>

<style>

body{
font-family: Arial;
background:#0d0d0d;
color:white;
margin:0;
}

header{
background:black;
padding:20px;
text-align:center;
color:#a855f7;
}

section{
padding:25px;
}

.card{
background:#1a1a1a;
padding:20px;
margin:15px 0;
border-radius:10px;
}

button{
background:#a855f7;
border:none;
padding:12px;
color:white;
border-radius:8px;
width:100%;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}

</style>
</head>

<body>

<header>
<h1>AF Te Bregamos</h1>
<p>No te compliques que te bregamos</p>
</header>

<section>

<h2>Biografía</h2>

<div class="card">
Somos una plataforma de servicios digitales creada para facilitar soluciones rápidas a nuestros clientes.
</div>

<h2>Valores</h2>

<div class="card">
✔ Responsabilidad  
✔ Confianza  
✔ Rapidez  
✔ Servicio de calidad
</div>

<h2>Servicios</h2>

<div class="card">
<h3>Seguros</h3>

<select>
<option>Pasola</option>
<option>Motor</option>
</select>

<input placeholder="Nombre completo">
<input placeholder="Número de cédula">
<input placeholder="Documento del vehículo">

<button onclick="enviarSeguro()">Solicitar seguro</button>

</div>

<div class="card">

<h3>Streaming</h3>

<select id="plataforma">
<option>Netflix</option>
<option>HBO</option>
</select>

<select id="tipo">
<option>Pantalla</option>
<option>Cuenta privada</option>
</select>

<input type="number" min="1" max="5" placeholder="Cantidad">

<button onclick="enviarStreaming()">Solicitar</button>

</div>

<h2>Reseñas</h2>

<div class="card">

<input placeholder="Tu nombre">
<textarea placeholder="Escribe tu reseña"></textarea>

<button>Publicar</button>

</div>

</section>

<script>

function enviarSeguro(){

let telefono="1809TUWHATSAPP"

let mensaje="Hola quiero solicitar un seguro desde la página AF Te Bregamos"

window.open("https://wa.me/"+telefono+"?text="+encodeURIComponent(mensaje))

}

function enviarStreaming(){

let telefono="1809TUWHATSAPP"

let mensaje="Hola quiero comprar un servicio de streaming desde la página AF Te Bregamos"

window.open("https://wa.me/"+telefono+"?text="+encodeURIComponent(mensaje))

}

</script>

</body>
</html>
