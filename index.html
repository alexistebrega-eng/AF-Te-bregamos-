<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AF Te Bregamos</title>

<style>

body{
font-family:Arial;
background:black;
color:white;
margin:0;
}

header{
background:#6a0dad;
padding:20px;
text-align:center;
}

header img{
margin-top:10px;
}

section{
padding:20px;
}

.servicio{
background:#111;
padding:20px;
margin:15px 0;
border-radius:10px;
}

button{
background:#6a0dad;
color:white;
border:none;
padding:10px;
border-radius:5px;
margin-top:10px;
cursor:pointer;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:5px;
border:none;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
}

.reseña{
background:#1c1c1c;
padding:10px;
margin:10px 0;
border-radius:5px;
}

</style>

</head>

<body>

<header>

<h1>AF Te Bregamos</h1>
<p>No te compliques, nosotros te bregamos</p>

<a href="https://www.instagram.com/alexis_tebrega?igsh=MWo3ZWNpcWloOWU2bQ==" target="_blank">

<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="40">

</a>

</header>

<section>

<h2>Servicios</h2>

<div class="servicio">

<h3>Seguros</h3>

<label>Tipo de vehículo</label>

<select id="tipoVehiculo">
<option>Pasola</option>
<option>Motor</option>
</select>

<input id="nombreSeguro" placeholder="Nombre completo">

<input id="cedulaSeguro" placeholder="Cédula">

<label>Método de pago</label>

<select id="pagoSeguro">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<button onclick="enviarSeguro()">Solicitar</button>

</div>

<div class="servicio">

<h3>Streaming</h3>

<label>Plataforma</label>

<select id="plataforma">

<option>Netflix</option>
<option>HBO</option>

</select>

<label>Tipo</label>

<select id="tipoCuenta" onchange="mostrarOpciones()">

<option value="">Seleccionar</option>
<option value="pantalla">Pantalla</option>
<option value="privada">Cuenta privada</option>

</select>

<div id="pantallas" style="display:none">

<label>Cantidad de pantallas</label>

<input type="number" min="1" max="5" id="cantidadPantallas">

</div>

<div id="cuentas" style="display:none">

<select id="tipoPrivada">

<option>Basic</option>
<option>Estándar</option>
<option>Premium</option>

</select>

</div>

<label>Método de pago</label>

<select id="pagoStreaming">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<button onclick="enviarStreaming()">Solicitar</button>

</div>

<div class="servicio">

<h3>Pedidos Temu / Shein</h3>

<input id="productoPedido" placeholder="Producto a pedir">

<label>Método de pago</label>

<select id="pagoPedido">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<button onclick="enviarPedido()">Solicitar</button>

</div>

<div class="servicio">

<h3>Repuestos</h3>

<input id="repuesto" placeholder="Repuesto que necesitas">

<label>Método de pago</label>

<select id="pagoRepuesto">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<button onclick="enviarRepuesto()">Solicitar</button>

</div>

</section>

<section>

<h2>Reseñas</h2>

<div class="reseña">

⭐⭐⭐⭐⭐  
"Excelente servicio"

</div>

<div class="reseña">

⭐⭐⭐⭐⭐  
"Entrega rápida"

</div>

<input id="nuevaReseña" placeholder="Escribe tu reseña">

<button onclick="agregarReseña()">Publicar</button>

<div id="listaReseñas"></div>

</section>

<a class="whatsapp" href="https://wa.me/18494349505" target="_blank">

<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="60">

</a>

<script>

function mostrarOpciones(){

let tipo=document.getElementById("tipoCuenta").value

document.getElementById("pantallas").style.display="none"
document.getElementById("cuentas").style.display="none"

if(tipo=="pantalla"){

document.getElementById("pantallas").style.display="block"

}

if(tipo=="privada"){

document.getElementById("cuentas").style.display="block"

}

}

function enviarSeguro(){

let tipo=document.getElementById("tipoVehiculo").value
let nombre=document.getElementById("nombreSeguro").value
let cedula=document.getElementById("cedulaSeguro").value
let pago=document.getElementById("pagoSeguro").value

let mensaje=`Solicitud Seguro
Nombre: ${nombre}
Cedula: ${cedula}
Vehiculo: ${tipo}
Pago: ${pago}`

window.open("https://wa.me/18494349505?text="+encodeURIComponent(mensaje))

}

function enviarStreaming(){

let plataforma=document.getElementById("plataforma").value
let tipo=document.getElementById("tipoCuenta").value
let pantallas=document.getElementById("cantidadPantallas").value
let privada=document.getElementById("tipoPrivada").value
let pago=document.getElementById("pagoStreaming").value

let detalle=tipo=="pantalla" ? pantallas+" pantallas" : privada

let mensaje=`Streaming
Plataforma: ${plataforma}
Tipo: ${detalle}
Pago: ${pago}`

window.open("https://wa.me/18494349505?text="+encodeURIComponent(mensaje))

}

function enviarPedido(){

let producto=document.getElementById("productoPedido").value
let pago=document.getElementById("pagoPedido").value

let mensaje=`Pedido Temu/Shein
Producto: ${producto}
Pago: ${pago}`

window.open("https://wa.me/18494349505?text="+encodeURIComponent(mensaje))

}

function enviarRepuesto(){

let repuesto=document.getElementById("repuesto").value
let pago=document.getElementById("pagoRepuesto").value

let mensaje=`Solicitud Repuesto
Repuesto: ${repuesto}
Pago: ${pago}`

window.open("https://wa.me/18494349505?text="+encodeURIComponent(mensaje))

}

function agregarReseña(){

let texto=document.getElementById("nuevaReseña").value

let div=document.createElement("div")

div.className="reseña"

div.innerText="⭐⭐⭐⭐⭐ "+texto

document.getElementById("listaReseñas").appendChild(div)

}

</script>

</body>
</html>
