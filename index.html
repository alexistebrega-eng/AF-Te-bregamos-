<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEXIS TE BREGA 🦇</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a0f2e;
            --accent-neon: #8b5cf6;
            --accent-glow: #a78bfa;
            --text-primary: #ffffff;
            --text-secondary: #b4b4b4;
            --border-glow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .header { text-align: center; padding: 2rem 1rem; }
        .logo {
            font-size: clamp(2.5rem, 8vw, 6rem);
            background: linear-gradient(45deg, var(--accent-neon), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: var(--border-glow);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px var(--accent-neon)); }
            to { filter: drop-shadow(0 0 30px var(--accent-glow)); }
        }

        .categories {
            display: flex;
            overflow-x: auto;
            padding: 1rem 2rem;
            gap: 1rem;
            background: rgba(0,0,0,0.5);
        }

        .category-btn {
            flex: 0 0 auto;
            padding: 1rem 2rem;
            background: rgba(139, 92, 246, 0.2);
            border: 2px solid var(--accent-neon);
            border-radius: 50px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            min-width: 180px;
            text-align: center;
        }

        .category-btn:hover, .category-btn.active {
            background: var(--accent-neon);
            box-shadow: var(--border-glow);
            transform: translateY(-5px);
        }

        .main-content { padding: 2rem; max-width: 1400px; margin: 0 auto; }

        .section { display: none; animation: fadeIn 0.5s ease; }
        .section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .carousel { margin-bottom: 3rem; }
        .carousel-title {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--accent-glow);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .carousel-container {
            display: flex;
            overflow-x: auto;
            gap: 1.5rem;
            padding: 1rem 0;
            scroll-behavior: smooth;
        }

        .carousel-item {
            flex: 0 0 280px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 1px solid rgba(139,92,246,0.3);
            position: relative;
        }

        .carousel-item:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: var(--border-glow);
            border-color: var(--accent-neon);
        }

        .item-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .item-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem; }
        .item-price { 
            color: var(--accent-neon);
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .add-to-cart {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(45deg, var(--accent-neon), var(--accent-glow));
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .add-to-cart:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(139,92,246,0.4);
        }

        /* Cart */
        .cart-toggle {
            position: fixed;
            top: 100px;
            right: 20px;
            background: var(--accent-neon);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1001;
            box-shadow: var(--border-glow);
        }

        .cart {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10,10,10,0.98);
            backdrop-filter: blur(20px);
            border: 2px solid var(--accent-neon);
            border-radius: 15px;
            padding: 1.5rem;
            min-width: 350px;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            max-height: 80vh;
            overflow-y: auto;
        }

        .cart.open { transform: translateX(0); }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .cart-total {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-neon);
            margin-top: 1rem;
            text-align: center;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(45deg, #10b981, #059669);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        /* Admin */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .admin-panel.active { display: flex; }

        .admin-content {
            background: var(--bg-secondary);
            padding: 3rem;
            border-radius: 20px;
            border: 2px solid var(--accent-neon);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        .admin-form input {
            width: 100%;
            padding: 1rem;
            margin: 1rem 0;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--accent-neon);
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .main-content { padding: 1rem; }
            .cart { right: 10px; left: 10px; min-width: auto; top: 10px; }
            .cart-toggle { top: 80px; right: 10px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1 class="logo">🦇 ALEXIS TE BREGA</h1>
    </header>

    <!-- Categories -->
    <nav class="categories">
        <div class="category-btn active" data-section="home">🏠 Inicio</div>
        <div class="category-btn" data-section="streaming">📺 Streaming</div>
        <div class="category-btn" data-section="pedidos">🛒 Pedidos</div>
        <div class="category-btn" data-section="motores">🏍️ Repuestos</div>
        <div class="category-btn" onclick="toggleAdmin()">🔐 Admin</div>
    </nav>

    <!-- Content -->
    <main class="main-content">
        <section id="home" class="section active">
            <div class="carousel">
                <h2 class="carousel-title">🔥 Top Ofertas</h2>
                <div class="carousel-container" id="home-carousel"></div>
            </div>
        </section>

        <section id="streaming" class="section">
            <div class="carousel">
                <h2 class="carousel-title">📺 Streaming Premium</h2>
                <div class="carousel-container" id="streaming-carousel"></div>
            </div>
        </section>

        <section id="pedidos" class="section">
            <div class="carousel">
                <h2 class="carousel-title">🛒 Productos Temu</h2>
                <div class="carousel-container" id="pedidos-carousel"></div>
            </div>
        </section>

        <section id="motores" class="section">
            <div class="carousel">
                <h2 class="carousel-title">🏍️ Repuestos Motores</h2>
                <div class="carousel-container" id="motores-carousel"></div>
            </div>
        </section>
    </main>

    <!-- Cart -->
    <button class="cart-toggle" onclick="toggleCart()">🛒</button>
    <div class="cart" id="cart">
        <h3>🛒 Carrito (<span id="cart-count">0</span>)</h3>
        <div id="cart-items">Carrito vacío</div>
        <div class="cart-total">Total: $<span id="cart-total">0</span></div>
        <button class="checkout-btn" onclick="checkoutWhatsApp()">💳 WhatsApp Pago</button>
        <button class="add-to-cart" onclick="clearCart()" style="background: #ef4444;">🗑️ Vaciar</button>
    </div>

    <!-- Admin -->
    <div class="admin-panel" id="admin-panel">
        <div class="admin-content">
            <h2>🔐 Panel Admin</h2>
            <div class="admin-form">
                <input type="password" id="admin-password" placeholder="Contraseña: alexis123">
                <button class="add-to-cart" onclick="loginAdmin()">Entrar</button>
            </div>
            <div id="admin-dashboard" style="display:none;">
                <h3>📊 Dashboard Admin</h3>
                <div id="admin-stats"></div>
                <h4>➕ Nuevo Repuesto</h4>
                <input type="text" id="new-part-name" placeholder="Nombre pieza">
                <input type="number" id="new-part-price" placeholder="Precio $">
                <input type="url" id="new-part-image" placeholder="https://imagen.com">
                <button class="add-to-cart" onclick="addPart()">➕ Agregar</button>
            </div>
        </div>
    </div>

    <script>
        // 🔥 APP COMPLETA FUNCIONAL
        let cart = [];
        const ADMIN_PASSWORD = "alexis123";
        const WA_NUMBER = "18291234567"; // CAMBIA TU NÚMERO

        // Datos de prueba
        const products = {
            streaming: [
                {id:1, name:'Netflix Premium', price:12.99, image:'https://via.placeholder.com/280x180/8b5cf6/ffffff?text=NETFLIX'},
                {id:2, name:'YouTube Premium', price:9.99, image:'https://via.placeholder.com/280x180/ff0000/ffffff?text=YOUTUBE'},
                {id:3, name:'HBO Max', price:14.99, image:'https://via.placeholder.com/280x180/002d73/ffffff?text=HBO'},
                {id:4, name:'Combo Todo', price:29.99, image:'https://via.placeholder.com/280x180/8b5cf6/000?text=COMBO'}
            ],
            pedidos: [
                {id:5, name:'Auriculares TWS', price:19.99, image:'https://via.placeholder.com/280x180/10b981/fff?text=AURICULARES', link:'https://temu.com'},
                {id:6, name:'Smartwatch Pro', price:29.99, image:'https://via.placeholder.com/280x180/f59e0b/000?text=SMARTWATCH'},
                {id:7, name:'Camiseta Gaming', price:14.99, image:'https://via.placeholder.com/280x180/ef4444/fff?text=CAMISETA'}
            ],
            motores: [
                {id:10, name:'Filtro Yamaha', price:15.99, image:'https://via.placeholder.com/280x180/059669/fff?text=FILTRO'},
                {id:11, name:'Bujía NGK', price:8.99, image:'https://via.placeholder.com/280x180/ef4444/fff?text=BUJIA'},
                {id:12, name:'Cadena Moto', price:45.99, image:'https://via.placeholder.com/280x180/f59e0b/000?text=CADENA'}
            ]
        };

        // Inicializar
        document.addEventListener('DOMContentLoaded', function(){
            loadAllSections();
            setupNavigation();
            setupCarousels();
            updateCart();
        });

        function loadAllSections(){
            document.getElementById('home-carousel').innerHTML = createItems(products.streaming.slice(0,3).concat(products.pedidos.slice(0,2)));
            document.getElementById('streaming-carousel').innerHTML = createItems(products.streaming);
            document.getElementById('pedidos-carousel').innerHTML = createItems(products.pedidos, true);
            document.getElementById('motores-carousel').innerHTML = createItems(products.motores);
        }

        function createItems(items, isTemu=false){
            return items.map(item => isTemu ? 
                `<div class="carousel-item"><img src="${item.image}" class="item-image"><div class="item-title">${item.name}</div><div class="item-price">$${item.price}</div><a href="${item.link}" target="_blank" class="add-to-cart">👀 Temu</a></div>` :
                `<div class="carousel-item" onclick="itemClick(${item.id})"><img src="${item.image}" class="item-image"><div class="item-title">${item.name}</div><div class="item-price">$${item.price}</div><button class="add-to-cart" onclick="event.stopPropagation(); addToCart({id:${item.id},name:'${item.name}',price:${item.price},image:'${item.image}'})">➕ Carrito</button></div>`
            ).join('');
        }

        // Navegación
        function setupNavigation(){
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.onclick = (e) => {
                    const section = e.target.dataset.section;
                    if(section){
                        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                        document.getElementById(section).classList.add('active');
                        e.target.classList.add('active');
                    }
                }
            });
        }

        // Carrito
        function addToCart(item){
            const existing = cart.find(p => p.id === item.id);
            if(existing) existing.quantity = (existing.quantity || 1) + 1;
            else cart.push({...item, quantity:1});
            updateCart();
            showNotification('✅ Agregado al carrito!');
        }

        function updateCart(){
            document.getElementById('cart-count').textContent = cart.reduce((sum,item)=>sum+(item.quantity||1),0);
            const itemsEl = document.getElementById('cart-items');
            if(cart.length === 0){
                itemsEl.innerHTML = '<p style="text-align:center;color:var(--text-secondary);">🛒 Carrito vacío</p>';
                document.getElementById('cart-total').textContent = '0';
                return;
            }
            itemsEl.innerHTML = cart.map(item => 
                `<div class="cart-item">
                    <img src="${item.image}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;">
                    <div style="flex:1;">
                        <div>${item.name}</div>
                        <div style="color:var(--accent-neon);font-weight:bold;">$${item.price}</div>
                        <div>Cant: ${(item.quantity||1)}</div>
                    </div>
                    <button onclick="removeFromCart(${item.id})" style="background:#ef4444;border:none;color:white;padding:0.5rem 1rem;border-radius:20px;cursor:pointer;font-size:12px;">❌</
