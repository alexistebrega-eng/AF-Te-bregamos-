<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALEXIS TE BREGA</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:white;}
header{background:#6a0dad;padding:15px;display:flex;align-items:center;}
.menu{position:fixed;left:-260px;width:260px;height:100%;background:#111;transition:0.4s;}
.menu.active{left:0;}
.overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.7);opacity:0;pointer-events:none;}
.overlay.active{opacity:1;pointer-events:auto;}
.seccion{display:none;padding:20px;}
.seccion.activa{display:block;animation:fade 0.4s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.card{background:#111;margin:10px;padding:20px;border-radius:12px;text-align:center;}
.btn{background:#25D366;padding:10px;border:none;border-radius:10px;color:white;}
.success{color:#00ffae;}
.danger{color:red;}
.dashboard{display:flex;gap:10px;flex-wrap:wrap;}
.box{flex:1;background:#111;padding:15px;border-radius:10px;text-align:center;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#6a0dad;padding:10px;border-radius:10px;opacity:0;}
.toast.show{opacity:1;}
</style>
</head>

<body>

<header>
<span onclick="abrirMenu()">☰</span>
<h2>ALEXIS TE BREGA</h2>
</header>

<div id="menu" class="menu">
<div onclick="cerrarMenu()">✖</div>
<a onclick="mostrar('inicio')">Inicio</a>
<a onclick="mostrar('streaming')">Streaming</a>
<a onclick="mostrar('panel')">Panel</a>
</div>

<div id="overlay" class="overlay" onclick="cerrarMenu()"></div>

<!-- INICIO -->
<div id="inicio" class="seccion activa">
<h2>🔥 Bienvenido</h2>
</div>

<!-- STREAMING -->
<div id="streaming" class="seccion">

<h2>🔥 Streaming</h2>

<div class="card">
<h2>Netflix</h2>
<button class="btn" onclick="comprar('Netflix',300)">RD$300</button>
</div>

<div class="card">
<h2>YouTube</h2>
<button class="btn" onclick="comprar('YouTube',250)">RD$250</button>
</div>

<div class="card">
<h2>Combo</h2>
<button class="btn" onclick="comprar('Combo',450)">RD$450</button>
</div>

</div>

<!-- PANEL -->
<div id="panel" class="seccion">

<h2>📊 Dashboard</h2>

<div class="dashboard">
<div class="box" id="totalClientes">0</div>
<div class="box" id="ingresos">RD$0</div>
<div class="box" id="activos">0 activos</div>
</div>

<h3>Clientes</h3>
<div id="clientes"></div>

</div>

<div id="toast" class="toast"></div>

<script>

// MENU
function abrirMenu(){menu.classList.add("active");overlay.classList.add("active");}
function cerrarMenu(){menu.classList.remove("active");overlay.classList.remove("active");}

// SECCIONES
function mostrar(id){
document.querySelectorAll(".seccion").forEach(s=>s.classList.remove("activa"));
document.getElementById(id).classList.add("activa");
cerrarMenu();
}

// COMPRA
function comprar(plan,precio){

let clientes=JSON.parse(localStorage.getItem("clientes"))||[];

let hoy=new Date();
let vence=new Date();
vence.setDate(hoy.getDate()+30);

clientes.push({
plan,
precio,
fecha:hoy.toLocaleDateString(),
vence:vence.toLocaleDateString()
});

localStorage.setItem("clientes",JSON.stringify(clientes));

toast("Cliente agregado");
actualizarDashboard();

location.href="https://wa.me/18494349505?text="+encodeURIComponent(`Quiero ${plan}`);
}

// DASHBOARD
function actualizarDashboard(){

let clientes=JSON.parse(localStorage.getItem("clientes"))||[];

let total=clientes.length;
let ingresos=0;
let activos=0;

let hoy=new Date();

clientes.forEach(c=>{
ingresos+=c.precio;

if(new Date(c.vence) > hoy){
activos++;
}
});

totalClientes.innerText=total+" clientes";
ingresos.innerText="RD$"+ingresos;
activos.innerText=activos+" activos";

}

// VER CLIENTES
function verClientes(){

let clientes=JSON.parse(localStorage.getItem("clientes"))||[];

let html="";

clientes.forEach(c=>{
let estado=new Date(c.vence)>new Date()?"Activo":"Vencido";

html+=`
<div class="card">
<p>${c.plan} - RD$${c.precio}</p>
<p>${estado}</p>
<p>Vence: ${c.vence}</p>
</div>
`;
});

document.getElementById("clientes").innerHTML=html;

actualizarDashboard();
}

// TOAST
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

// AUTO LOAD
window.onload=()=>{
verClientes();
};

</script>

</body>
</html>
