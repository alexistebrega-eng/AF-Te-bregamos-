<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AF Te Bregamos</title>

<style>
body{margin:0;font-family:Arial;background:black;color:white;}
header{background:#6a0dad;padding:15px;display:flex;align-items:center;}
.menuBtn{font-size:25px;cursor:pointer;margin-right:15px;}
.menu{height:100%;width:0;position:fixed;top:0;left:0;background:#111;transition:0.3s;padding-top:60px;z-index:10;}
.menu a{padding:12px 20px;display:block;color:white;text-decoration:none;}
.menu a:hover{background:#6a0dad;}
.seccion{display:none;padding:20px;}
#inicio{display:block;}
input,select{width:100%;padding:8px;margin-top:8px;border-radius:5px;border:none;}
button{background:#6a0dad;color:white;border:none;padding:10px;margin-top:10px;border-radius:5px;cursor:pointer;}
.whatsapp{position:fixed;bottom:20px;right:20px;}
.card{background:#111;margin:15px 0;padding:20px;border-radius:15px;text-align:center;box-shadow:0 0 10px rgba(168,85,247,0.3);}
.btn{background:#25D366;padding:10px 20px;border:none;border-radius:10px;color:white;cursor:pointer;}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="menu">
<a onclick="mostrarSeccion('inicio')">Inicio</a>
<a onclick="mostrarSeccion('streaming')">Streaming</a>
<a onclick="mostrarSeccion('pedidos')">Pedidos</a>
<a onclick="mostrarSeccion('repuestos')">Repuestos</a>
</div>

<header>
<span class="menuBtn" onclick="abrirMenu()">☰</span>
<h2>AF Te Bregamos</h2>
</header>

<!-- INICIO -->
<div id="inicio" class="seccion">
<h2>Bienvenido</h2>
<p>Servicios rápidos y confiables.</p>
</div>

<!-- STREAMING -->
<div id="streaming" class="seccion">

<h2 style="text-align:center;color:#a855f7;">🔥 STREAMING PREMIUM 🔥</h2>

<h3 id="autoMsg" style="text-align:center;color:#00ffae;">🔥 Oferta activa</h3>
<p id="cupos" style="text-align:center;color:red;">10 disponibles</p>

<div class="card">
<h2>📺 Netflix Pantalla</h2>
<h1>RD$300</h1>
<button class="btn" onclick="comprar('Netflix Pantalla RD$300')">Comprar</button>
</div>

<div class="card">
<h2>🎧 YouTube Music</h2>
<h3 style="text-decoration:line-through;color:red;">RD$300</h3>
<h1 style="color:#00ffae;">RD$250</h1>
<button class="btn" onclick="comprar('YouTube Music RD$250')">Comprar</button>
</div>

<div class="card">
<h2>🔥 Combo</h2>
<h3 style="text-decoration:line-through;color:red;">RD$500</h3>
<h1 style="color:#00ffae;">RD$450</h1>
<button class="btn" onclick="comprar('Combo RD$450')">Comprar</button>
</div>

<button class="btn" onclick="verClientes()">📊 Ver Clientes</button>

<div id="panel"></div>

</div>

<!-- PEDIDOS -->
<div id="pedidos" class="seccion">
<input id="productoPedido" placeholder="Producto">
<button onclick="enviarPedido()">Enviar</button>
</div>

<!-- REPUESTOS -->
<div id="repuestos" class="seccion">
<input id="repuesto" placeholder="Repuesto">
<button onclick="enviarRepuesto()">Enviar</button>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/18494349505">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="60">
</a>

<script>

// MENU
function abrirMenu(){document.getElementById("menu").style.width="250px";}
function mostrarSeccion(id){
document.querySelectorAll(".seccion").forEach(sec=>sec.style.display="none");
document.getElementById(id).style.display="block";
}

// COMPRA INTELIGENTE + GUARDADO
function comprar(plan){

let mensaje="";

if(plan.includes("Combo")) mensaje="🔥 Quiero el combo RD$450";
else if(plan.includes("Netflix")) mensaje="📺 Quiero Netflix RD$300";
else if(plan.includes("YouTube")) mensaje="🎧 Quiero YouTube RD$250";

guardarCliente(plan);

location.href="https://wa.me/18494349505?text="+encodeURIComponent(mensaje);
}

// GUARDAR CLIENTES
function guardarCliente(plan){
let clientes=JSON.parse(localStorage.getItem("clientes"))||[];
clientes.push({plan:plan,fecha:new Date().toLocaleDateString(),estado:"Pendiente"});
localStorage.setItem("clientes",JSON.stringify(clientes));
}

// VER CLIENTES
function verClientes(){
let clientes=JSON.parse(localStorage.getItem("clientes"))||[];
let html="<h3>Clientes</h3>";
clientes.forEach(c=>{
html+=`<p>${c.plan} - ${c.fecha} - ${c.estado}</p>`;
});
document.getElementById("panel").innerHTML=html;
}

// URGENCIA
let cupos=10;
setInterval(()=>{
if(cupos>0){
cupos--;
document.getElementById("cupos").innerText=cupos+" disponibles";
}
},15000);

// MENSAJES DINÁMICOS
setInterval(()=>{
let textos=["🔥 Últimos cupos","⚡ Compra ahora","💰 Oferta activa"];
document.getElementById("autoMsg").innerText=textos[Math.floor(Math.random()*textos.length)];
},4000);

// PEDIDOS
function enviarPedido(){
let p=document.getElementById("productoPedido").value;
location.href="https://wa.me/18494349505?text="+encodeURIComponent("Pedido: "+p);
}

// REPUESTOS
function enviarRepuesto(){
let r=document.getElementById("repuesto").value;
location.href="https://wa.me/18494349505?text="+encodeURIComponent("Repuesto: "+r);
}

</script>

</body>
</html>
