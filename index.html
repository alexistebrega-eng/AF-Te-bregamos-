<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alexis Te Brega</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0b0b0b;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
border-bottom:3px solid purple;
}

h1{
color:#bb86fc;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:20px;
}

.menu button{
padding:15px;
background:#1a1a1a;
border:none;
border-radius:10px;
color:white;
}

.panel{
display:none;
padding:20px;
}

input,select,textarea{

width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;

}

.boton{

background:purple;
color:white;
padding:12px;
border:none;
border-radius:8px;
width:100%;

}

.card{

background:#1a1a1a;
padding:15px;
border-radius:10px;
margin-top:10px;

}

.admin{
background:#111;
padding:20px;
margin-top:30px;
border-top:2px solid purple;
}

</style>
</head>

<body>

<header>

<h1>AF Te Bregamos</h1>

<p>No te compliques que nosotros te bregamos</p>

</header>

<div class="menu">

<button onclick="abrirPanel('seguros')">Seguros</button>

<button onclick="abrirPanel('streaming')">Streaming</button>

<button onclick="abrirPanel('temu')">Pedidos Temu / Shein</button>

<button onclick="abrirPanel('repuestos')">Repuestos</button>

<button onclick="abrirPanel('delivery')">Delivery</button>

<button onclick="abrirPanel('reseñas')">Reseñas</button>

</div>

<!-- SEGUROS -->

<div id="seguros" class="panel">

<h2>Seguro de Vehículo</h2>

<select id="tipoVehiculo">

<option>Pasola</option>
<option>Motor</option>

</select>

<input id="nombreSeguro" placeholder="Nombre">

<input id="cedulaSeguro" placeholder="Cédula">

<button class="boton" onclick="enviarSeguro()">

Solicitar Seguro

</button>

</div>

<!-- STREAMING -->

<div id="streaming" class="panel">

<h2>Streaming</h2>

<select id="plataforma">

<option>Netflix</option>
<option>HBO</option>

</select>

<select id="tipoCuenta" onchange="cambiarTipo()">

<option value="pantalla">Pantalla</option>
<option value="privada">Cuenta privada</option>

</select>

<div id="pantallas">

<input type="number" min="1" max="5" placeholder="Cantidad pantallas" id="cantidad">

</div>

<div id="privada" style="display:none">

<select id="tipoPrivada">

<option>Basic</option>
<option>Estándar</option>
<option>Premium</option>

</select>

</div>

<button class="boton" onclick="enviarStreaming()">

Comprar Streaming

</button>

</div>

<!-- TEMU -->

<div id="temu" class="panel">

<h2>Pedido Temu / Shein</h2>

<input id="linkPedido" placeholder="Pega el link del producto">

<button class="boton" onclick="enviarTemu()">

Enviar Pedido

</button>

</div>

<!-- REPUESTOS -->

<div id="repuestos" class="panel">

<h2>Repuestos de Motor</h2>

<input id="pieza" placeholder="Pieza a solicitar">

<button class="boton" onclick="enviarRepuesto()">

Consultar

</button>

</div>

<!-- DELIVERY -->

<div id="delivery" class="panel">

<h2>Delivery</h2>

<input id="direccion" placeholder="Dirección de entrega">

<button class="boton" onclick="enviarDelivery()">

Solicitar Delivery

</button>

</div>

<!-- RESEÑAS -->

<div id="reseñas" class="panel">

<h2>Reseñas de Clientes</h2>

<input id="cliente">

<textarea id="comentario"></textarea>

<button class="boton" onclick="guardarReseña()">

Publicar Reseña

</button>

<div id="listaReseñas"></div>

</div>

<!-- PANEL ADMIN -->

<div class="admin">

<h2>Panel Administrador</h2>

<p>Aquí puedes ver pedidos enviados desde la página.</p>

<button class="boton" onclick="verPedidos()">

Ver Pedidos

</button>

<div id="listaPedidos"></div>

</div>

<script>

function abrirPanel(id){

let paneles=document.querySelectorAll(".panel")

paneles.forEach(p=>p.style.display="none")

document.getElementById(id).style.display="block"

}

function cambiarTipo(){

let tipo=document.getElementById("tipoCuenta").value

if(tipo=="pantalla"){

document.getElementById("pantallas").style.display="block"
document.getElementById("privada").style.display="none"

}

else{

document.getElementById("pantallas").style.display="none"
document.getElementById("privada").style.display="block"

}

}

function enviarSeguro(){

let tipo=document.getElementById("tipoVehiculo").value
let nombre=document.getElementById("nombreSeguro").value
let cedula=document.getElementById("cedulaSeguro").value

let mensaje=`Seguro
Nombre: ${nombre}
Cedula: ${cedula}
Vehiculo: ${tipo}`

guardarPedido(mensaje)

window.open("https://wa.me/18494349505?text="+encodeURIComponent(mensaje))

}

function enviarStreaming(){

let plataforma=document.getElementById("plataforma").value
let tipo=document.getElementById("tipoCuenta").value

let mensaje=`Streaming
Plataforma: ${plataforma}
Tipo: ${tipo}`

guardarPedido(mensaje)

window.open("https://wa.me/18494349505?text="+encodeURIComponent(mensaje))

}

function enviarTemu(){

let link=document.getElementById("linkPedido").value

let mensaje=`Pedido Temu/Shein
Link: ${link}`

guardarPedido(mensaje)

window.open("https://wa.me/18494349505?text="+encodeURIComponent(mensaje))

}

function enviarRepuesto(){

let pieza=document.getElementById("pieza").value

let mensaje=`Consulta Repuesto
Pieza: ${pieza}`

guardarPedido(mensaje)

window.open("https://wa.me/18494349505?text="+encodeURIComponent(mensaje))

}

function enviarDelivery(){

let direccion=document.getElementById("direccion").value

let mensaje=`Solicitud Delivery
Direccion: ${direccion}`

guardarPedido(mensaje)

window.open("https://wa.me/18494349505?text="+encodeURIComponent(mensaje))

}

function guardarPedido(texto){

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[]

pedidos.push(texto)

localStorage.setItem("pedidos",JSON.stringify(pedidos))

}

function verPedidos(){

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[]

let html=""

pedidos.forEach(p=>{

html+=`<div class="card">${p}</div>`

})

document.getElementById("listaPedidos").innerHTML=html

}

function guardarReseña(){

let nombre=document.getElementById("cliente").value
let comentario=document.getElementById("comentario").value

let html=`<div class="card"><b>${nombre}</b><br>${comentario}</div>`

document.getElementById("listaReseñas").innerHTML+=html

}

</script>

</body>
  </html>
