<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALEXIS TE BREGA</title>

<link rel="stylesheet" href="css/styles.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>
<body>

<!-- HEADER -->
<header class="header">
  <span class="menuBtn" onclick="abrirMenu()">☰</span>

  <div class="logo">
    <span class="bat">🦇</span>
    <h2>ALEXIS TE BREGA</h2>
  </div>
</header>

<!-- MENU -->
<div id="menu" class="menu">
  <a onclick="mostrar('inicio')">🏠 Inicio</a>
  <a onclick="mostrar('streaming')">📺 Streaming</a>
  <a onclick="mostrar('carrito')">🛒 Carrito</a>
</div>

<div id="overlay" class="overlay" onclick="cerrarMenu()"></div>

<!-- INICIO -->
<div id="inicio" class="seccion activa">

<h2>🔥 Top Películas</h2>
<div class="carrusel-container">
  <button class="btn-carrusel left" onclick="scrollCarrusel('peliculas',-1)">❮</button>
  <div id="peliculas" class="carrusel"></div>
  <button class="btn-carrusel right" onclick="scrollCarrusel('peliculas',1)">❯</button>
</div>

<h2>🍥 Top Anime</h2>
<div class="carrusel-container">
  <button class="btn-carrusel left" onclick="scrollCarrusel('anime',-1)">❮</button>
  <div id="anime" class="carrusel"></div>
  <button class="btn-carrusel right" onclick="scrollCarrusel('anime',1)">❯</button>
</div>

</div>

<!-- STREAMING -->
<div id="streaming" class="seccion">

<h2>🔥 Streaming Premium</h2>

<div class="stream-grid">

<!-- NETFLIX -->
<div class="card">
  <img class="logo-stream" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
  <h3>Netflix</h3>
  <p class="price">RD$300</p>
  <button class="btn" onclick="comprar('Netflix',300)">Agregar</button>
</div>

<!-- YOUTUBE -->
<div class="card">
  <img class="logo-stream" src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Youtube_Music_icon.svg">
  <h3>YouTube Music</h3>
  <p class="price">RD$250</p>
  <button class="btn" onclick="comprar('YouTube Music',250)">Agregar</button>
</div>

<!-- COMBO -->
<div class="card combo">
  <div class="badge">🔥 POPULAR</div>

  <div class="combo-logos">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
    <span>+</span>
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Youtube_Music_icon.svg">
  </div>

  <h3>Combo Premium</h3>
  <p class="price">RD$500</p>

  <button class="btn combo-btn" onclick="comprar('Combo',500)">
    🔥 Lo quiero
  </button>
</div>

</div>

</div>

<!-- CARRITO -->
<div id="carrito" class="seccion">
<h2>🛒 Carrito</h2>

<div id="carritoLista"></div>

<h3 id="carritoTotal">Total: RD$0</h3>

<button class="btn combo-btn" onclick="enviarCarrito()">
📲 Finalizar pedido
</button>
</div>

<!-- MODAL TRAILER -->
<div id="modal">
  <span class="close" onclick="cerrarTrailer()">✖</span>
  <iframe id="iframeTrailer" allowfullscreen></iframe>
</div>

<!-- BOTONES FLOTANTES -->
<div class="floating">
  <a href="https://wa.me/18494349505" target="_blank" class="whatsapp">📲</a>
  <a href="#" class="instagram">📸</a>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- JS -->
<script src="js/app.js"></script>

</body>
</html>
