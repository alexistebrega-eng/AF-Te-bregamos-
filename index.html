<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALEXIS TE BREGA</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:white;}
header{background:#6a0dad;padding:15px;display:flex;align-items:center;}
.menuBtn{font-size:25px;cursor:pointer;margin-right:15px;}

.menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#111;
transition:0.3s;
z-index:1000;
}
.menu.active{left:0;}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:999;
}
.overlay.active{display:block;}

.menu a{display:block;padding:15px;cursor:pointer;}
.menu a:hover{background:#6a0dad;}

.seccion{display:none;padding:20px;}
.seccion.activa{display:block;animation:fade 0.3s;}

@keyframes fade{from{opacity:0}to{opacity:1}}

.card{
background:#111;
margin:10px 0;
padding:20px;
border-radius:12px;
text-align:center;
}

.btn{
background:#25D366;
padding:10px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#6a0dad;
padding:10px 20px;
border-radius:10px;
opacity:0;
transition:0.3s;
}
.toast.show{opacity:1;}

.success{color:#00ffae;}
.danger{color:red;}

</style>
</head>

<body>

<header>
<span class="menuBtn" onclick="abrirMenu()">☰</span>
<h2>ALEXIS TE BREGA</h2>
</header>

<div id="menu" class="menu">
<a onclick="mostrar('inicio')">Inicio</a>
<a onclick="mostrar('streaming')">Streaming</a>
<a onclick="mostrar('panel')">Panel</a>
</div>

<div id="overlay" class="overlay" onclick="cerrarMenu()"></div>

<!-- INICIO -->
<div id="inicio" class="seccion activa">
<h2>🔥 Bienvenido</h2>
</div>

<!-- STREAMING -->
<div id="streaming" class="seccion">

<h2>🔥 Streaming</h2>

<div class="card">
<h2>Netflix</h2>
<p>RD$300</p>
<button class="btn" onclick="comprar('Netflix',300)">Comprar</button>
</div>

<div class="card">
<h2>YouTube Music</h2>
<p>RD$250</p>
<button class="btn" onclick="comprar('YouTube',250)">Comprar</button>
</div>

<div class="card">
<h2>Combo</h2>
<p>RD$450</p>
<button class="btn" onclick="comprar('Combo',450)">Comprar</button>
</div>

</div>

<!-- PANEL -->
<div id="panel" class="seccion">
<h2>📊 Dashboard</h2>

<p id="total"></p>
<p id="ingresos"></p>

<div id="clientes"></div>

</div>

<div id="toast" class="toast"></div>

<script>

// MENU
function abrirMenu(){
document.getElementById("menu").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function cerrarMenu(){
document.getElementById("menu").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

// SECCIONES
function mostrar(id){
document.querySelectorAll(".seccion").forEach(s=>s.classList.remove("activa"));
document.getElementById(id).classList.add("activa");
cerrarMenu();
}

// COMPRA
function comprar(plan,precio){

let clientes=JSON.parse(localStorage.getItem("clientes"))||[];

let hoy=new Date();
let vence=new Date();
vence.setDate(hoy.getDate()+30);

clientes.push({
plan:plan,
precio:precio,
vence:vence.toLocaleDateString()
});

localStorage.setItem("clientes",JSON.stringify(clientes));

toast("Cliente agregado");

actualizar();

location.href="https://wa.me/18494349505?text="+encodeURIComponent("Quiero "+plan);
}

// TOAST
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

// ACTUALIZAR PANEL
function actualizar(){

let clientes=JSON.parse(localStorage.getItem("clientes"))||[];

let total=clientes.length;
let ingresos=0;

let html="";

clientes.forEach(c=>{
ingresos+=c.precio;

html+=`
<div class="card">
<p>${c.plan}</p>
<p>RD$${c.precio}</p>
<p>Vence: ${c.vence}</p>
</div>
`;
});

document.getElementById("total").innerText="Clientes: "+total;
document.getElementById("ingresos").innerText="Ingresos: RD$"+ingresos;
document.getElementById("clientes").innerHTML=html;

}

// AUTO LOAD
window.onload=actualizar;

</script>

</body>
</html>
