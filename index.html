<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALEXIS TE BREGA</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
  overflow-x:hidden;
}

/* HEADER */
header{
  background:#6a0dad;
  padding:15px;
  display:flex;
  align-items:center;
}

/* MENU */
.menuBtn{font-size:25px;cursor:pointer;margin-right:15px;}

.menu{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#111;
  transition:0.3s;
  z-index:1000;
}
.menu.active{left:0;}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:999;
}
.overlay.active{display:block;}

.menu a{display:block;padding:15px;cursor:pointer;}
.menu a:hover{background:#6a0dad;}

/* SECCIONES */
.seccion{
  display:none;
  padding:20px;
  opacity:0;
  transform:translateY(20px);
  transition:0.4s;
}
.seccion.activa{
  display:block;
  opacity:1;
  transform:translateY(0);
}

/* CARDS */
.card{
  background:#111;
  margin:15px 0;
  padding:20px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

/* LOGOS */
.logo{
  width:60px;
  margin-bottom:10px;
}

/* BOTONES */
.btn{
  background:#25D366;
  padding:12px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.success{color:#00ffae;}
.danger{color:red;}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#6a0dad;
  padding:10px 20px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}
.toast.show{opacity:1;}

/* 🔥 COMBO IRRESISTIBLE */
.combo-card{
  position:relative;
  border:2px solid #00ffae;
  box-shadow:0 0 20px rgba(0,255,174,0.4);
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px rgba(0,255,174,0.3);}
  to{box-shadow:0 0 30px rgba(0,255,174,0.9);}
}

/* BADGE */
.badge{
  position:absolute;
  top:-10px;
  left:-10px;
  background:red;
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
  font-weight:bold;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

/* LOGOS COMBO */
.logos-combo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:10px;
}

.plus{
  font-size:25px;
  color:#00ffae;
}

/* ANIMACIÓN LOGOS */
.anim{
  opacity:0;
  transform:translateY(10px);
  animation:fadeUp 0.5s forwards;
}

.delay{animation-delay:0.3s;}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0);}
}

/* BOTÓN COMBO */
.combo-btn{
  background:#00ffae;
  color:black;
  font-weight:bold;
}

.combo-btn:active{transform:scale(0.9);}

.price{
  font-size:22px;
  font-weight:bold;
  color:#00ffae;
}

/* ================== CARRUSEL ESTILO NETFLIX ================== */
.carrusel-container{
  position:relative;
}

.carrusel{
  display:flex;
  gap:10px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  padding:10px 0;
  scroll-behavior:smooth;
}

.carrusel::-webkit-scrollbar{
  display:none;
}

.pelicula{
  min-width:140px;
  height:200px;
  border-radius:10px;
  overflow:hidden;
  scroll-snap-align:start;
  transition:0.3s;
  flex-shrink:0;
}

.pelicula img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.pelicula:hover{
  transform:scale(1.1);
}

/* BOTONES CARRUSEL */
.btn-carrusel{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(106,13,173,0.7);
  border:none;
  color:white;
  font-size:30px;
  padding:10px;
  cursor:pointer;
  border-radius:50%;
  z-index:10;
}

.btn-left{left:0;}
.btn-right{right:0;}

</style>
</head>

<body>

<header>
  <span class="menuBtn" onclick="abrirMenu()">☰</span>
  <h2>ALEXIS TE BREGA</h2>
</header>

<div id="menu" class="menu">
  <a onclick="mostrar('inicio')">Inicio</a>
  <a onclick="mostrar('streaming')">Streaming</a>
  <a onclick="mostrar('panel')">Panel</a>
</div>

<div id="overlay" class="overlay" onclick="cerrarMenu()"></div>

<!-- INICIO -->
<div id="inicio" class="seccion activa">

<h2>🔥 Top 10 en RD</h2>

<div class="carrusel-container">
  <button class="btn-carrusel btn-left" onclick="scrollCarrusel(-1)">❮</button>
  <div id="carrusel" class="carrusel">
    <div class="pelicula"><img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg"></div>
    <div class="pelicula"><img src="https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg"></div>
    <div class="pelicula"><img src="https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg"></div>
    <div class="pelicula"><img src="https://image.tmdb.org/t/p/w500/5YZbUmjbMa3ClvSW1Wj3D6XGolb.jpg"></div>
    <div class="pelicula"><img src="https://image.tmdb.org/t/p/w500/rktDFPbfHfUbArZ6OOOKsXcv0Bm.jpg"></div>
    <div class="pelicula"><img src="https://image.tmdb.org/t/p/w500/kGzFbGhp99zva6oZODW5atUtnqi.jpg"></div>
    <div class="pelicula"><img src="https://image.tmdb.org/t/p/w500/2lECpi35Hnbpa4y46JX0aY3AWTy.jpg"></div>
    <div class="pelicula"><img src="https://image.tmdb.org/t/p/w500/mu8RKavbv7MLZndJEX0PH1V1Fh.jpg"></div>
    <div class="pelicula"><img src="https://image.tmdb.org/t/p/w500/6oH378KUfCEitzJkm07r97L0RsZ.jpg"></div>
    <div class="pelicula"><img src="https://image.tmdb.org/t/p/w500/3bhkrj58Vtu7enYsRolD1fZdja1.jpg"></div>
  </div>
  <button class="btn-carrusel btn-right" onclick="scrollCarrusel(1)">❯</button>
</div>

</div>

<!-- STREAMING -->
<div id="streaming" class="seccion">

<h2>🔥 Streaming Premium</h2>

<!-- NETFLIX -->
<div class="card">
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
  <h2>Netflix</h2>
  <p>RD$300</p>
  <button class="btn" onclick="comprar('Netflix',300)">Comprar</button>
</div>

<!-- YOUTUBE -->
<div class="card">
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Youtube_Music_icon.svg">
  <h2>YouTube Music</h2>
  <p class="success">RD$250</p>
  <button class="btn" onclick="comprar('YouTube Music',250)">Comprar</button>
</div>

<!-- 🔥 COMBO IRRESISTIBLE -->
<div class="card combo-card">
  <div class="badge">🔥 MÁS VENDIDO</div>
  <div class="logos-combo">
    <img class="logo anim" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
    <span class="plus">+</span>
    <img class="logo anim delay" src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Youtube_Music_icon.svg">
  </div>
  <h2>Combo Premium</h2>
  <p class="price">RD$500</p>
  <button class="btn combo-btn" onclick="comprar('Combo',500)">🔥 Lo Quiero</button>
</div>

</div>

<!-- PANEL -->
<div id="panel" class="seccion">
<h2>📊 Dashboard</h2>
<p id="total"></p>
<p id="ingresos"></p>
<div id="clientes"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// MENU
function abrirMenu(){
  document.getElementById("menu").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}
function cerrarMenu(){
  document.getElementById("menu").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

// SECCIONES
function mostrar(id){
  document.querySelectorAll(".seccion").forEach(s=>s.classList.remove("activa"));
  document.getElementById(id).classList.add("activa");
  cerrarMenu();
}

// COMPRA
function comprar(plan,precio){
  let clientes=JSON.parse(localStorage.getItem("clientes"))||[];
  let hoy=new Date();
  let vence=new Date();
  vence.setDate(hoy.getDate()+30);
  clientes.push({plan,precio,vence:vence.toLocaleDateString()});
  localStorage.setItem("clientes",JSON.stringify(clientes));
  toast("✅ Cliente agregado");
  actualizar();
  location.href="https://wa.me/18494349505?text="+encodeURIComponent("Quiero "+plan);
}

// TOAST
function toast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

// PANEL
function actualizar(){
  let clientes=JSON.parse(localStorage.getItem("clientes"))||[];
  let total=clientes.length;
  let ingresos=0;
  let html="";
  clientes.forEach(c=>{
    ingresos+=c.precio;
    html+=`
      <div class="card">
        <p>${c.plan}</p>
        <p>RD$${c.precio}</p>
        <p>Vence: ${c.vence}</p>
      </div>
    `;
  });
  document.getElementById("total").innerText="Clientes: "+total;
  document.getElementById("ingresos").innerText="Ingresos: RD$"+ingresos;
  document.getElementById("clientes").innerHTML=html;
}

// INIT
window.onload=actualizar;

// ================== FUNCIONES CARRUSEL ==================
function scrollCarrusel(direccion){
  const carrusel=document.getElementById("carrusel");
  const width=carrusel.querySelector(".pelicula").offsetWidth + 10; // ancho + gap
  carrusel.scrollBy({left:direccion*width*3, behavior:'smooth'});
}
</script>

</body>
</html>
