<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEXIS TE BREGA 🦇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
        }
        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(45deg, #8b5cf6, #000);
        }
        .logo {
            font-size: 3rem;
            font-weight: bold;
        }
        .categories {
            display: flex;
            gap: 10px;
            padding: 20px;
            overflow-x: auto;
            background: #111;
        }
        .category-btn {
            padding: 15px 25px;
            background: #8b5cf6;
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            white-space: nowrap;
            font-weight: bold;
        }
        .category-btn:hover, .category-btn.active {
            background: #a78bfa;
            transform: scale(1.05);
        }
        .main-content { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .section { display: none; }
        .section.active { display: block; }
        .carousel-title {
            font-size: 2rem;
            text-align: center;
            margin: 30px 0 20px;
            color: #8b5cf6;
        }
        .carousel-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 20px 0;
            scroll-snap-type: x mandatory;
        }
        .carousel-item {
            flex: 0 0 300px;
            background: #222;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #333;
        }
        .carousel-item:hover {
            transform: translateY(-10px);
            border-color: #8b5cf6;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }
        .item-image {
            width: 100%;
            height: 200px;
            background: #444;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #ccc;
        }
        .item-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; }
        .item-price { 
            font-size: 1.5rem; 
            color: #8b5cf6; 
            font-weight: bold; 
            margin-bottom: 15px; 
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #8b5cf6, #a78bfa);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(139,92,246,0.4); }
        .btn-danger { background: linear-gradient(45deg, #ef4444, #dc2626); }

        /* Cart */
        .cart-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #8b5cf6;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1000;
        }
        .cart {
            position: fixed;
            top: 90px;
            right: 20px;
            width: 380px;
            max-height: 70vh;
            background: #111;
            border: 2px solid #8b5cf6;
            border-radius: 15px;
            padding: 20px;
            transform: translateX(450px);
            transition: transform 0.3s;
            z-index: 999;
            overflow-y: auto;
        }
        .cart.open { transform: translateX(0); }
        .cart h3 { margin-bottom: 20px; color: #8b5cf6; }
        .cart-item {
            display: flex;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }
        .cart-item img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            background: #444;
        }
        .cart-total {
            font-size: 1.8rem;
            text-align: center;
            margin: 20px 0;
            color: #8b5cf6;
        }

        /* Admin */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .admin-panel.active { display: flex; }
        .admin-content {
            background: #222;
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #8b5cf6;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        .admin-content input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #333;
            border: 2px solid #8b5cf6;
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
        }
        .admin-content input::placeholder { color: #999; }

        @media (max-width: 768px) {
            .cart { right: 10px; left: 10px; width: auto; top: 90px; }
            .main-content { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="logo">🦇 ALEXIS TE BREGA</h1>
    </div>

    <div class="categories">
        <button class="category-btn active" onclick="showSection('home')">🏠 Inicio</button>
        <button class="category-btn" onclick="showSection('streaming')">📺 Streaming</button>
        <button class="category-btn" onclick="showSection('pedidos')">🛒 Pedidos</button>
        <button class="category-btn" onclick="showSection('motores')">🏍️ Repuestos</button>
        <button class="category-btn" onclick="toggleAdmin()">🔐 Admin</button>
    </div>

    <main class="main-content">
        <section id="home" class="section active">
            <h2 class="carousel-title">🔥 TOP OFERTAS</h2>
            <div class="carousel-container" id="home-items"></div>
        </section>

        <section id="streaming" class="section">
            <h2 class="carousel-title">📺 STREAMING PREMIUM</h2>
            <div class="carousel-container" id="streaming-items"></div>
        </section>

        <section id="pedidos" class="section">
            <h2 class="carousel-title">🛒 PRODUCTOS TEMU</h2>
            <div class="carousel-container" id="pedidos-items"></div>
        </section>

        <section id="motores" class="section">
            <h2 class="carousel-title">🏍️ REPUESTOS MOTORES</h2>
            <div class="carousel-container" id="motores-items"></div>
        </section>
    </main>

    <!-- CARRITO -->
    <button class="cart-toggle" onclick="toggleCart()">🛒</button>
    <div class="cart" id="cart">
        <h3>🛒 MI CARRITO (<span id="cart-count">0</span>)</h3>
        <div id="cart-items"></div>
        <div class="cart-total">TOTAL: $<span id="cart-total">0</span></div>
        <button class="btn" onclick="pagarWhatsApp()">💳 PAGAR WHATSAPP</button>
        <button class="btn btn-danger" onclick="vaciarCarrito()">🗑️ VACIAR</button>
    </div>

    <!-- ADMIN -->
    <div class="admin-panel" id="admin">
        <div class="admin-content">
            <h2>🔐 PANEL ADMIN</h2>
            <input type="password" id="admin-pass" placeholder="Contraseña: admin123">
            <button class="btn" onclick="entrarAdmin()">ENTRAR</button>
            <div id="admin-area" style="display:none;margin-top:30px;">
                <h3>📊 DASHBOARD</h3>
                <div id="admin-stats">Cargando...</div>
                <h4 style="margin-top:30px;">➕ NUEVO REPUESTO</h4>
                <input type="text" id="part-name" placeholder="Nombre">
                <input type="number" id="part-price" placeholder="Precio">
                <input type="text" id="part-img" placeholder="URL imagen">
                <button class="btn" onclick="agregarRepuesto()">AGREGAR</button>
            </div>
        </div>
    </div>

    <script>
        // DATOS DE PRODUCTOS
        const productos = {
            streaming: [
                {id:1, nombre:'Netflix Premium', precio:12.99, imagen:'https://via.placeholder.com/300x200/8b5cf6/fff?text=NETFLIX'},
                {id:2, nombre:'YouTube Premium', precio:9.99, imagen:'https://via.placeholder.com/300x200/ff0000/fff?text=YOUTUBE'},
                {id:3, nombre:'HBO Max', precio:14.99, imagen:'https://via.placeholder.com/300x200/002d73/fff?text=HBO'},
                {id:4, nombre:'COMBO TODO', precio:29.99, imagen:'https://via.placeholder.com/300x200/8b5cf6/000?text=COMBO'}
            ],
            pedidos: [
                {id:5, nombre:'Auriculares TWS', precio:19.99, imagen:'https://via.placeholder.com/300x200/10b981/fff?text=AURICULARES', link:'https://temu.com'},
                {id:6, nombre:'Smartwatch Pro', precio:29.99, imagen:'https://via.placeholder.com/300x200/f59e0b/000?text=SMARTWATCH'},
                {id:7, nombre:'Camiseta Gaming', precio:14.99, imagen:'https://via.placeholder.com/300x200/ef4444/fff?text=CAMISETA'}
            ],
            motores: [
                {id:10, nombre:'Filtro Yamaha', precio:15.99, imagen:'https://via.placeholder.com/300x200/059669/fff?text=FILTRO'},
                {id:11, nombre:'Bujía NGK', precio:8.99, imagen:'https://via.placeholder.com/300x200/ef4444/fff?text=BUJIA'},
                {id:12, nombre:'Cadena Moto', precio:45.99, imagen:'https://via.placeholder.com/300x200/f59e0b/000?text=CADENA'}
            ]
        };

        let carrito = [];
        let adminActivo = false;

        // INICIALIZAR
        window.onload = function() {
            cargarSecciones();
            actualizarCarrito();
        };

        function cargarSecciones() {
            document.getElementById('home-items').innerHTML = crearItems(productos.streaming.slice(0,2).concat(productos.pedidos.slice(0,2)));
            document.getElementById('streaming-items').innerHTML = crearItems(productos.streaming);
            document.getElementById('pedidos-items').innerHTML = crearItemsTemu(productos.pedidos);
            document.getElementById('motores-items').innerHTML = crearItems(productos.motores);
        }

        function crearItems(productos) {
            return productos.map(p => `
                <div class="carousel-item">
                    <div class="item-image" style="background-image:url(${p.imagen})">${p.nombre}</div>
                    <div class="item-title">${p.nombre}</div>
                    <div class="item-price">$${p.precio}</div>
                    <button class="btn" onclick="agregarAlCarrito(${p.id},'${p.nombre}',${p.precio},'${p.imagen}')">➕ AL CARRITO</button>
                </div>
            `).join('');
        }

        function crearItemsTemu(productos) {
            return productos.map(p => `
                <div class="carousel-item">
                    <div class="item-image" style="background-image:url(${p.imagen})">${p.nombre}</div>
                    <div class="item-title">${p.nombre}</div>
                    <div class="item-price">$${p.precio}</div>
                    <a href="${p.link}" target="_blank" class="btn">🛒 VER EN TEMU</a>
                </div>
            `).join('');
        }

        // NAVEGACIÓN
        function showSection(seccion) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(seccion).classList.add('active');
            event.target.classList.add('active');
        }

        // CARRITO
        function agregarAlCarrito(id, nombre, precio, imagen) {
            const existe = carrito.find(item => item.id === id);
            if (existe) {
                existe.cantidad += 1;
            } else {
                carrito.push({id, nombre, precio, imagen, cantidad: 1});
            }
            actualizarCarrito();
            alert('✅ ' + nombre + ' agregado al carrito!');
        }

        function actualizarCarrito() {
            const totalItems = carrito.reduce((sum, item) => sum + item.cantidad, 0);
            document.getElementById('cart-count').textContent = totalItems;
            
            const contenedor = document.getElementById('cart-items');
            if (carrito.length === 0) {
                contenedor.innerHTML = '<p style="text-align:center;color:#999;">Carrito vacío 😢</p>';
                document.getElementById('cart-total').textContent = '0';
                return;
            }
            
            contenedor.innerHTML = carrito.map(item => `
                <div class="cart-item">
                    <div class="item-image" style="width:60px;height:60px;font-size:0.8rem;background-image:url(${item.imagen})">${item.nombre}</div>
                    <div style="flex:1">
                        <div>${item.nombre}</div>
                        <strong>$${item.precio} x ${item.cantidad}</strong>
                    </div>
                    <button class="btn btn-danger" onclick="quitarDelCarrito(${item.id})" style="padding:5px 15px;font-size:0.9rem;">❌</button>
                </div>
            `).join('');
            
            const total = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0).toFixed(2);
            document.getElementById('cart-total').textContent = total;
        }

        function quitarDelCarrito(id) {
            carrito = carrito.filter(item => item.id !== id);
            actualizarCarrito();
        }

        function vaciarCarrito() {
            carrito = [];
            actualizarCarrito();
        }

        function pagarWhatsApp() {
            if (carrito.length === 0) {
                alert('🛒 Carrito vacío!');
                return;
            }
            let mensaje = '🛒 *PEDIDO ALEXIS TE BREGA*\n\n';
            carrito.forEach(item => {
                mensaje += `${item.cantidad}x ${item.nombre} - $${(item.precio * item.cantidad).toFixed(2)}\n`;
            });
            mensaje += `\n💰 *TOTAL: $${carrito.reduce((sum,item)=>sum+(item.precio*item.cantidad),0).toFixed(2)}*`;
            window.open(`https://wa.me/18291234567?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        function toggleCart() {
            document.getElementById('cart').classList.toggle('open');
        }

        // ADMIN
        function toggleAdmin() {
            document.getElementById('admin').classList.toggle('active');
        }

        function entrarAdmin() {
            if (document.getElementById('admin-pass').value === 'admin123') {
                adminActivo = true;
                document.getElementById('admin-area').style.display = 'block';
                document.getElementById('admin-stats').innerHTML = `
                    <div>Ventas: ${carrito.length} | Items: ${carrito.reduce((s,i)=>s+i.cantidad,0)}</div>
                    <div>Total Ganado: $${carrito.reduce((s,i)=>s+(i.precio*i.cantidad),0).toFixed(2)}</div>
                `;
                alert('✅ Admin activado!');
            } else {
                alert('❌ Contraseña incorrecta!');
            }
        }

        function agregarRepuesto() {
            const nombre = document.getElementById('part-name').value;
            const precio = parseFloat(document.getElementById('part-price').value);
            const imagen = document.getElementById('part-img').value || 'https://via.placeholder.com/300x200/059669/fff?text=NUEVO';
            
            if
