<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALEXIS TE BREGA - Premium</title>

<link rel="stylesheet" href="css/styles.css">

<!-- Firebase (VERSIÓN CORRECTA) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
/* 🔥 ESTILOS QUE TE FALTABAN */
.carrusel{
  display:flex;
  gap:15px;
  overflow-x:auto;
  scroll-behavior:smooth;
  padding:10px 0;
}
.carrusel::-webkit-scrollbar{display:none;}

.pelicula{
  min-width:180px;
  height:270px;
  border-radius:10px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:0.3s;
}

.pelicula img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.pelicula:hover{
  transform:scale(1.1);
  z-index:5;
}

.play-btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:none;
  background:white;
  border-radius:50%;
  padding:10px;
}

.pelicula:hover .play-btn{
  display:block;
}

.info-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  background:linear-gradient(transparent,#000);
  padding:10px;
  opacity:0;
  transition:0.3s;
}

.pelicula:hover .info-overlay{
  opacity:1;
}

/* MODAL */
#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#modal iframe{
  width:80%;
  height:80%;
  border:none;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  font-size:30px;
  cursor:pointer;
}
</style>

</head>
<body>

<header>
 <div style="position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:9999;">

  <a href="https://wa.me/18494349505" target="_blank" 
     style="background:#25D366;padding:15px;border-radius:50%;color:white;text-decoration:none;font-size:20px;">
    📲
  </a>

  <a href="https://instagram.com/" target="_blank" 
     style="background:#E1306C;padding:15px;border-radius:50%;color:white;text-decoration:none;font-size:20px;">
    📸
  </a>

</div>
  <span class="menuBtn" onclick="abrirMenu()">☰</span>
  <h2>ALEXIS TE BREGA</h2>
</header>
<div id="carrito" class="seccion">
  <h2>🛒 Carrito</h2>

  <div id="carritoLista"></div>

  <h3 id="carritoTotal">Total: RD$0</h3>

  <button class="btn combo-btn" onclick="enviarCarrito()">
    📲 Enviar pedido
  </button>
</div>
<div id="menu" class="menu">
 <a onclick="mostrar('carrito')">Carrito</a>
  <a onclick="mostrar('inicio')">Inicio</a>
  <a onclick="mostrar('streaming')">Streaming</a>
  <a onclick="login()">Admin</a>
</div>

<div id="overlay" class="overlay" onclick="cerrarMenu()"></div>

<!-- INICIO -->
<div id="inicio" class="seccion activa">

<h2>🔥 Películas</h2>
<div class="carrusel-container">
  <button class="btn-carrusel btn-left" onclick="scrollCarrusel('peliculas',-1)">❮</button>
  <div id="peliculas" class="carrusel"></div>
  <button class="btn-carrusel btn-right" onclick="scrollCarrusel('peliculas',1)">❯</button>
</div>

<h2>🍥 Anime</h2>
<div class="carrusel-container">
  <button class="btn-carrusel btn-left" onclick="scrollCarrusel('anime',-1)">❮</button>
  <div id="anime" class="carrusel"></div>
  <button class="btn-carrusel btn-right" onclick="scrollCarrusel('anime',1)">❯</button>
</div>

</div>

<!-- STREAMING -->
<div id="streaming" class="seccion">
<h2>🔥 Streaming Premium</h2>

<div class="card">
  <h2>Netflix</h2>
  <p>RD$300</p>
  <button class="btn" onclick="comprar('Netflix',300)">Comprar</button>
</div>

<div class="card">
  <h2>YouTube Music</h2>
  <p>RD$250</p>
  <button class="btn" onclick="comprar('YouTube Music',250)">Comprar</button>
</div>

<div class="card combo-card">
  <div class="badge">🔥 MÁS VENDIDO</div>
  <h2>Combo Premium</h2>
  <p class="price">RD$500</p>
  <button class="btn combo-btn" onclick="comprar('Combo',500)">🔥 Lo Quiero</button>
</div>

</div>

<!-- ADMIN -->
<div id="admin" class="seccion">
  <h2>📊 Clientes</h2>
  <div id="listaClientes"></div>
</div>

<!-- MODAL -->
<div id="modal">
  <span class="close" onclick="cerrarTrailer()">✖</span>
  <iframe id="iframeTrailer" allowfullscreen></iframe>
</div>

<div id="toast" class="toast"></div>

<!-- JS -->
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>

</body>
</html>
