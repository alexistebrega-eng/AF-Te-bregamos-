<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALEXIS TE BREGA</title>

<link rel="stylesheet" href="css/styles.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>
<body>

<header class="header">
  <span class="menuBtn" onclick="abrirMenu()">☰</span>
  <div class="logo">
    🦇 ALEXIS TE BREGA
  </div>
</header>

<div id="menu" class="menu">
  <a onclick="mostrar('inicio')">Inicio</a>
  <a onclick="mostrar('streaming')">Streaming</a>
  <a onclick="mostrar('carrito')">Carrito</a>
</div>

<div id="overlay" class="overlay" onclick="cerrarMenu()"></div>

<!-- INICIO -->
<div id="inicio" class="seccion activa">

<h2>🔥 Películas</h2>
<div class="carrusel-container">
  <button onclick="scrollCarrusel('peliculas',-1)">❮</button>
  <div id="peliculas" class="carrusel"></div>
  <button onclick="scrollCarrusel('peliculas',1)">❯</button>
</div>

<h2>🍥 Anime</h2>
<div class="carrusel-container">
  <button onclick="scrollCarrusel('anime',-1)">❮</button>
  <div id="anime" class="carrusel"></div>
  <button onclick="scrollCarrusel('anime',1)">❯</button>
</div>

</div>

<!-- STREAMING -->
<div id="streaming" class="seccion">

<h2>🔥 Streaming</h2>

<div class="stream-grid">

<div class="card">
  <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
  <h3>Netflix</h3>
  <p>RD$300</p>
  <button onclick="comprar('Netflix',300)">Agregar</button>
</div>

<div class="card">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Youtube_Music_icon.svg">
  <h3>YouTube Music</h3>
  <p>RD$250</p>
  <button onclick="comprar('YouTube Music',250)">Agregar</button>
</div>

<div class="card combo">
  <h3>🔥 Combo</h3>
  <p>RD$500</p>
  <button onclick="comprar('Combo',500)">Agregar</button>
</div>

</div>

</div>

<!-- CARRITO -->
<div id="carrito" class="seccion">
<h2>🛒 Carrito</h2>
<div id="carritoLista"></div>
<h3 id="carritoTotal">Total: RD$0</h3>
<button onclick="enviarCarrito()">Enviar pedido</button>
</div>

<!-- MODAL -->
<div id="modal">
<span onclick="cerrarTrailer()">X</span>
<iframe id="iframeTrailer"></iframe>
</div>

<script src="js/app.js"></script>

</body>
</html>
