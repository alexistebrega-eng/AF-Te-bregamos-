<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALEXIS TE BREGA</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:white;}
header{background:#6a0dad;padding:15px;display:flex;align-items:center;}
.menuBtn{font-size:25px;margin-right:15px;cursor:pointer;}
.menu{position:fixed;width:0;height:100%;background:#111;transition:0.3s;overflow:hidden;}
.menu a{display:block;padding:12px;color:white;text-decoration:none;}
.seccion{display:none;padding:20px;}
#inicio{display:block;}
.card{background:#111;margin:10px;padding:20px;border-radius:12px;text-align:center;}
.btn{background:#25D366;padding:10px;border:none;border-radius:10px;color:white;cursor:pointer;}
.danger{color:red;}
.success{color:#00ffae;}
</style>
</head>

<body>

<header>
<span class="menuBtn" onclick="abrirMenu()">☰</span>
<h2>ALEXIS TE BREGA</h2>
</header>

<div id="menu" class="menu">
<a onclick="mostrar('inicio')">Inicio</a>
<a onclick="mostrar('streaming')">Streaming</a>
<a onclick="mostrar('panel')">Panel</a>
</div>

<!-- INICIO -->
<div id="inicio" class="seccion">
<h2>🔥 Bienvenido</h2>
<p>Servicios premium rápidos y seguros.</p>
</div>

<!-- STREAMING -->
<div id="streaming" class="seccion">

<h2>🔥 Streaming Premium</h2>

<h3 id="autoMsg" class="success">🔥 Oferta activa</h3>
<p id="cupos" class="danger">10 disponibles</p>

<div class="card">
<h2>📺 Netflix</h2>
<p>RD$300</p>
<button class="btn" onclick="comprar('Netflix',300)">Comprar</button>
</div>

<div class="card">
<h2>🎧 YouTube Music</h2>
<p class="danger"><s>RD$300</s></p>
<p class="success">RD$250</p>
<button class="btn" onclick="comprar('YouTube',250)">Comprar</button>
</div>

<div class="card">
<h2>🔥 Combo</h2>
<p class="danger"><s>RD$500</s></p>
<p class="success">RD$450</p>
<button class="btn" onclick="comprar('Combo',450)">Comprar</button>
</div>

</div>

<!-- PANEL -->
<div id="panel" class="seccion">
<h2>📊 Panel de Clientes</h2>
<button class="btn" onclick="verClientes()">Actualizar</button>
<button class="btn" onclick="exportar()">Exportar</button>
<div id="clientes"></div>
</div>

<script>

// MENU
function abrirMenu(){
document.getElementById("menu").style.width="250px";
}
function mostrar(id){
document.querySelectorAll(".seccion").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

// COMPRA + GUARDADO
function comprar(plan,precio){

let clientes=JSON.parse(localStorage.getItem("clientes"))||[];

let fecha=new Date();
let vence=new Date();
vence.setDate(fecha.getDate()+30);

clientes.push({
plan,
precio,
fecha:fecha.toLocaleDateString(),
vence:vence.toLocaleDateString(),
estado:"Activo"
});

localStorage.setItem("clientes",JSON.stringify(clientes));

let msg=`🔥 Quiero ${plan} RD$${precio}`;
location.href="https://wa.me/18494349505?text="+encodeURIComponent(msg);

}

// VER CLIENTES
function verClientes(){

let clientes=JSON.parse(localStorage.getItem("clientes"))||[];

let html="";
clientes.forEach((c,i)=>{

let hoy=new Date();
let vence=new Date(c.vence);

let estado = (vence < hoy) ? "Vencido" : "Activo";

html+=`
<div class="card">
<p>${c.plan} - RD$${c.precio}</p>
<p>📅 ${c.fecha}</p>
<p>⏳ Vence: ${c.vence}</p>
<p class="${estado=='Activo'?'success':'danger'}">${estado}</p>
<button onclick="eliminar(${i})">❌</button>
</div>
`;

});

document.getElementById("clientes").innerHTML=html;

}

// ELIMINAR
function eliminar(i){
let clientes=JSON.parse(localStorage.getItem("clientes"));
clientes.splice(i,1);
localStorage.setItem("clientes",JSON.stringify(clientes));
verClientes();
}

// EXPORTAR
function exportar(){
let data=localStorage.getItem("clientes");
navigator.clipboard.writeText(data);
alert("Copiado!");
}

// URGENCIA
let cupos=10;
setInterval(()=>{
if(cupos>0){
cupos--;
document.getElementById("cupos").innerText=cupos+" disponibles";
}
},15000);

// MENSAJES
setInterval(()=>{
let t=["🔥 Últimos cupos","⚡ Compra ahora","💰 Oferta activa"];
document.getElementById("autoMsg").innerText=t[Math.floor(Math.random()*t.length)];
},4000);

</script>

</body>
</html>
